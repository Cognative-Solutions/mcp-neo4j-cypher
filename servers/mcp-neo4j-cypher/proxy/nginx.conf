server {
    listen 8080;

    resolver [fd12::10] valid=10s;

    location /mcp/ {
        if ($http_authorization != "Bearer __MCP_AUTH_TOKEN__") {
            return 401 '{"jsonrpc":"2.0","id":"auth-error","error":{"code":-32600,"message":"Unauthorized"}}';
        }

        set $upstream http://neo4j-cypher.railway.internal:8000;
        proxy_pass $upstream/mcp/;

        proxy_set_header Host $host;
        proxy_set_header Content-Type $http_content_type;
        proxy_set_header Accept $http_accept;
        proxy_set_header Authorization "";
        proxy_buffering off;
        proxy_read_timeout 60s;
        proxy_http_version 1.1;
    }
}